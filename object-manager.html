<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Object Manager | YG GeoPortal</title>
  <link rel="icon" href="assets/logo-yayasan-gambut.png">
  <link rel="stylesheet" href="css/site-brand.css?v=20260720-program-dashboard1">
  <link rel="stylesheet" href="css/object-manager.css?v=3">
  <meta name="theme-color" content="#079cde">
  <meta name="application-name" content="YG GeoPortal">
  <meta name="apple-mobile-web-app-title" content="YG GeoPortal">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest?v=20260714-1">
  <link rel="apple-touch-icon" href="assets/logo-yayasan-gambut-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/logo-yayasan-gambut-192.png">
</head>
<body>
<header>
  <a href="index.html">← Dashboard</a>
  <div class="yg-header-brand">
    <img src="assets/logo-yayasan-gambut.png" alt="Logo Yayasan Gambut">
    <div class="yg-header-brand__text">
      <h1>Object Manager</h1>
      <p>Standarisasi atribut, pencocokan monitoring, dan simpan langsung ke GitHub.</p>
    </div>
  </div>
</header>

<main>
  <section class="toolbar">
    <label>Layer
      <select id="layer-select"></select>
    </label>
    <label>Cari
      <input id="search" type="search" placeholder="Object ID, nama, desa…">
    </label>
    <button id="download" type="button" class="secondary">Unduh cadangan GeoJSON</button>
  </section>

  <section class="sync-panel">
    <div>
      <strong>Simpan langsung ke GitHub</strong>
      <p>Perubahan seluruh layer aktif akan dibuat sebagai satu commit baru.</p>
    </div>
    <label>Token admin
      <input id="admin-token" type="password" autocomplete="off" placeholder="Token admin Apps Script">
    </label>
    <label>Alasan perubahan
      <input id="commit-message" type="text" maxlength="120" placeholder="Contoh: Koreksi atribut area mangrove Buruk Bakul">
    </label>
    <button id="save-github" type="button">Simpan ke GitHub</button>
    <span id="sync-status" class="sync-status" aria-live="polite"></span>
  </section>

  <section class="workspace">
    <aside>
      <div class="summary" id="summary"></div>
      <div id="object-list" class="object-list"></div>
    </aside>

    <article class="editor">
      <div id="empty">Pilih objek untuk mengedit atribut.</div>

      <form id="edit-form" hidden>
        <h2 id="edit-title"></h2>

        <div class="validation-box" id="validation-box"></div>

        <div class="form-grid">
          <label>Object_ID
            <input name="Object_ID" required>
          </label>
          <label>Nama Objek
            <input name="Nama_Objek" required>
          </label>
          <label>Kategori
            <input name="Kategori">
          </label>
          <label>Status Objek
            <select name="Status_Objek">
              <option>Aktif</option>
              <option>Tidak Aktif</option>
              <option>Arsip</option>
            </select>
          </label>
          <label>Kabupaten
            <input name="Kabupaten">
          </label>
          <label>Kecamatan
            <input name="Kecamatan">
          </label>
          <label>Desa
            <input name="Desa">
          </label>
          <label>Tahun/Fase
            <input name="Tahun">
          </label>
          <label>Luas (ha)
            <input name="Luas_Ha" type="number" step="any">
          </label>
          <label>Jumlah tanam
            <input name="Jumlah_Tanam" type="number" step="1">
          </label>
          <label>Panjang (m)
            <input name="Panjang_M" type="number" step="any">
          </label>
          <label>Program
            <input name="Program">
          </label>
        </div>

        <label>Catatan/Keterangan
          <textarea name="Ket" rows="3"></textarea>
        </label>

        <div class="actions">
          <button type="submit">Terapkan perubahan objek</button>
          <button id="reset-object" type="button" class="secondary">Batalkan perubahan objek</button>
        </div>

        <section class="match-box">
          <h3>Pencocokan monitoring</h3>
          <div id="match-info"></div>
        </section>

        <details>
          <summary>Lihat semua atribut</summary>
          <pre id="all-props"></pre>
        </details>
      </form>
    </article>
  </section>
</main>

<iframe id="github-sync-frame" name="github-sync-frame" hidden></iframe>
<form id="github-sync-form" method="post" target="github-sync-frame" hidden>
  <input name="action" value="github-update">
  <input name="token" id="sync-token-field">
  <input name="path" id="sync-path-field">
  <input name="content" id="sync-content-field">
  <input name="message" id="sync-message-field">
</form>

<script src="js/object-schema.js?v=20260720-endpoint1"></script>
<script src="js/object-manager.js?v=3"></script>
  <script src="js/pwa.js?v=20260723-edge-photo-fix1"></script>
</body>
</html>
