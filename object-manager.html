<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Object Manager | YG GeoPortal</title><link rel="icon" href="assets/logo-yayasan-gambut.png"><link rel="stylesheet" href="css/object-manager.css?v=2"></head><body><header><a href="index.html">← Dashboard</a><div><h1>Object Manager</h1><p>Standarisasi, revisi atribut, dan pencocokan objek dengan monitoring.</p></div></header><main><section class="toolbar"><label>Layer<select id="layer-select"></select></label><label>Cari<input id="search" type="search" placeholder="Object ID, nama, desa…"></label><button id="download" type="button">Unduh GeoJSON hasil revisi</button></section><section class="workspace"><aside><div class="summary" id="summary"></div><div id="object-list" class="object-list"></div></aside><article class="editor"><div id="empty">Pilih objek untuk mengedit atribut.</div><form id="edit-form" hidden><h2 id="edit-title"></h2><div class="form-grid"><label>Object_ID<input name="Object_ID" required></label><label>Nama Objek<input name="Nama_Objek" required></label><label>Kategori<input name="Kategori"></label><label>Status Objek<select name="Status_Objek"><option>Aktif</option><option>Tidak Aktif</option><option>Arsip</option></select></label><label>Kabupaten<input name="Kabupaten"></label><label>Kecamatan<input name="Kecamatan"></label><label>Desa<input name="Desa"></label><label>Tahun/Fase<input name="Tahun"></label><label>Luas (ha)<input name="Luas_Ha" type="number" step="any"></label><label>Jumlah tanam<input name="Jumlah_Tanam" type="number" step="1"></label><label>Panjang (m)<input name="Panjang_M" type="number" step="any"></label><label>Program<input name="Program"></label></div><label>Catatan/Keterangan<textarea name="Ket" rows="3"></textarea></label><div class="actions"><button type="submit">Simpan perubahan sementara</button><button id="reset-object" type="button" class="secondary">Batalkan perubahan objek</button></div><section class="match-box"><h3>Pencocokan monitoring</h3><div id="match-info"></div></section><details><summary>Lihat semua atribut</summary><pre id="all-props"></pre></details></form></article></section></main><script src="js/object-schema.js?v=2"></script><script src="js/object-manager.js?v=2"></script></body></html>
