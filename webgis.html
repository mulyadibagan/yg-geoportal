<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>WebGIS | YG GeoPortal</title>
  <link rel="icon" href="assets/logo-yayasan-gambut.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="webgis-body">
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <img src="assets/logo-yayasan-gambut.png" alt="Logo Yayasan Gambut"/>
      <span><strong>YG GeoPortal</strong><span>WebGIS Yayasan Gambut</span></span>
    </a>
    <nav class="nav"><a href="index.html">Beranda</a><a class="primary" href="webgis.html">WebGIS</a></nav>
  </div>
</header>

<div class="webgis-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <h2 class="panel-title">Cari lokasi</h2>
      <div class="search-box"><input id="search" type="search" placeholder="Sepahat, Temiang, FDRS..."/><button id="search-button">⌕</button></div>

      <h2 class="panel-title">Statistik</h2>
      <div class="sidebar-stats">
        <div class="sidebar-stat"><strong>13</strong><span>Desa</span></div>
        <div class="sidebar-stat"><strong>7.81 ha</strong><span>Mangrove</span></div>
        <div class="sidebar-stat"><strong>8</strong><span>FDRS</span></div>
        <div class="sidebar-stat"><strong>11</strong><span>Sekat kanal</span></div>
      </div>

      <h2 class="panel-title">Layer data</h2>
      <div class="layer-list"><div class="layer-item">
      <input type="checkbox" id="layer-desa_intervensi" data-layer-id="desa_intervensi" checked/>
      <span class="layer-swatch" style="background:#2e7d32"></span>
      <label for="layer-desa_intervensi">Batas Desa Intervensi</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-apo" data-layer-id="apo" checked/>
      <span class="layer-swatch" style="background:#d32f2f"></span>
      <label for="layer-apo">Alat Pemecah Ombak (APO)</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-area_mangrove" data-layer-id="area_mangrove" checked/>
      <span class="layer-swatch" style="background:#00796b"></span>
      <label for="layer-area_mangrove">Area Penanaman Mangrove</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-titik_desa" data-layer-id="titik_desa" />
      <span class="layer-swatch" style="background:#1565c0"></span>
      <label for="layer-titik_desa">Titik Desa Intervensi</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-kopi" data-layer-id="kopi" checked/>
      <span class="layer-swatch" style="background:#6d4c41"></span>
      <label for="layer-kopi">Distribusi Lahan Kopi</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-fdrs" data-layer-id="fdrs" checked/>
      <span class="layer-swatch" style="background:#e65100"></span>
      <label for="layer-fdrs">Pembangunan FDRS</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-sekat_kanal" data-layer-id="sekat_kanal" checked/>
      <span class="layer-swatch" style="background:#00838f"></span>
      <label for="layer-sekat_kanal">Pembangunan Sekat Kanal</label>
    </div>
<div class="layer-item">
      <input type="checkbox" id="layer-nursery_mangrove" data-layer-id="nursery_mangrove" checked/>
      <span class="layer-swatch" style="background:#8fa600"></span>
      <label for="layer-nursery_mangrove">Rumah Pembibitan Mangrove</label>
    </div></div>

      <div class="sidebar-actions">
        <button class="primary" id="fit-all">Tampilkan semua</button>
        <button id="locate-me">Lokasi saya</button>
      </div>
    </div>
  </aside>

  <main class="map-wrap">
    <div class="map-title"><strong>Peta Program Yayasan Gambut</strong><span>Basemap OpenStreetMap</span></div>
    <div id="map"></div>
    <button class="mobile-toggle" id="mobile-toggle">☰</button>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
